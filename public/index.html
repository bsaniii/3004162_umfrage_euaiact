<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Umfrage: EU AI Act in der Praxis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;--t:#0F6E56;--tl:#E1F5EE;--text:#1a1a1a;--mut:#6b6b6b;--hint:#9b9b9b;--bg:#fff;--surf:#f8f8f7;--brd:rgba(0,0,0,0.12);--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--text:#f0f0f0;--mut:#aaa;--hint:#666;--bg:#1c1c1e;--surf:#2a2a2c;--brd:rgba(255,255,255,0.1);--pl:#26215C;--pd:#AFA9EC}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surf);color:var(--text);min-height:100vh;padding:24px 16px}
.card{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--rl);padding:28px 24px;max-width:680px;margin:0 auto}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.logo{width:32px;height:32px;background:var(--p);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2}
.uni{font-size:12px;color:var(--mut);font-weight:500;line-height:1.4}
.pb-bg{height:3px;background:var(--brd);border-radius:2px;margin-bottom:28px}
.pb-fill{height:3px;background:var(--p);border-radius:2px;transition:width .4s}
.pb-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--hint)}
.sv{color:var(--t);display:none}.sv.show{display:inline}
.badge{display:inline-block;background:var(--pl);color:var(--pd);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:10px}
h1{font-size:20px;font-weight:600;margin-bottom:10px;line-height:1.35}
.intro{font-size:14px;color:var(--mut);line-height:1.75;margin-bottom:20px}
.notice{background:var(--pl);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--pd);margin-bottom:22px;display:flex;gap:10px;line-height:1.55}
.qb{margin-bottom:22px}
.ql{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.5}
.req{color:#D85A30}.qhint{font-size:12px;color:var(--hint);margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:0.5px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s;user-select:none}
.opt:hover{border-color:rgba(0,0,0,0.28);background:var(--surf)}
.opt.sel{border-color:var(--p);background:var(--pl)}
.opt input{margin-top:2px;accent-color:var(--p);flex-shrink:0;width:15px;height:15px;pointer-events:none}
.opt-t{font-size:14px;line-height:1.45}
.lkwrap{overflow-x:auto;border:0.5px solid var(--brd);border-radius:var(--r)}
.lkt{width:100%;border-collapse:collapse;min-width:460px}
.lkt th{font-weight:400;color:var(--mut);text-align:center;padding:8px 6px;font-size:12px;background:var(--surf);border-bottom:0.5px solid var(--brd)}
.lkt th:first-child{text-align:left;width:46%;padding-left:12px}
.lkt td{text-align:center;padding:10px 6px;border-top:0.5px solid var(--brd)}
.lkt tbody tr:hover td{background:var(--surf)}
.lkt td:first-child{text-align:left;font-size:13px;padding-left:12px;padding-right:8px;line-height:1.4}
.lkt input[type=radio]{accent-color:var(--p);width:16px;height:16px;cursor:pointer}
input[type=text],input[type=email],textarea{width:100%;padding:10px 12px;border:0.5px solid var(--brd);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.err{font-size:12px;color:#D85A30;margin-top:5px;display:none}.err.show{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:20px;border-top:0.5px solid var(--brd)}
.btn{padding:10px 22px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid rgba(0,0,0,0.25);background:var(--bg);color:var(--text);font-family:inherit}
.btn:hover{background:var(--surf)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:var(--pd)}
.si{font-size:12px;color:var(--hint)}
.suc{text-align:center;padding:36px 16px}
.suc-icon{width:60px;height:60px;background:var(--tl);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.suc-icon svg{width:28px;height:28px;fill:none;stroke:var(--t);stroke-width:2.5}
