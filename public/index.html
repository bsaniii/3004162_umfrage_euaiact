<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umfrage: EU AI Act in der Praxis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;--t:#0F6E56;--tl:#E1F5EE;--text:#1a1a1a;--mut:#6b6b6b;--hint:#9b9b9b;--bg:#fff;--surf:#f8f8f7;--brd:rgba(0,0,0,0.12);--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--text:#f0f0f0;--mut:#aaa;--hint:#666;--bg:#1c1c1e;--surf:#2a2a2c;--brd:rgba(255,255,255,0.1);--pl:#26215C;--pd:#AFA9EC}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surf);color:var(--text);min-height:100vh;padding:24px 16px}
.card{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--rl);padding:28px 24px;max-width:680px;margin:0 auto}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.logo{width:32px;height:32px;background:var(--p);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2}
.uni{font-size:12px;color:var(--mut);font-weight:500;line-height:1.4}
.pb-bg{height:3px;background:var(--brd);border-radius:2px;margin-bottom:28px}
.pb-fill{height:3px;background:var(--p);border-radius:2px;transition:width .4s}
.pb-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--hint)}
.sv{color:var(--t);display:none}
.sv.show{display:inline}
.badge{display:inline-block;background:var(--pl);color:var(--pd);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:10px}
h1{font-size:20px;font-weight:600;margin-bottom:10px;line-height:1.35}
.intro{font-size:14px;color:var(--mut);line-height:1.75;margin-bottom:20px}
.notice{background:var(--pl);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--pd);margin-bottom:22px;display:flex;gap:10px;line-height:1.55}
.qb{margin-bottom:22px}
.ql{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.5}
.req{color:#D85A30}
.qhint{font-size:12px;color:var(--hint);margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:0.5px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s;user-select:none}
.opt:hover{border-color:rgba(0,0,0,0.25);background:var(--surf)}
.opt.sel{border-color:var(--p);background:var(--pl)}
.opt input{margin-top:2px;accent-color:var(--p);flex-shrink:0;width:15px;height:15px}
.opt-t{font-size:14px;line-height:1.45}
.lkwrap{overflow-x:auto;border:0.5px solid var(--brd);border-radius:var(--r)}
.lkt{width:100%;border-collapse:collapse;min-width:460px}
.lkt th{font-weight:400;color:var(--mut);text-align:center;padding:8px 6px;font-size:12px;background:var(--surf);border-bottom:0.5px solid var(--brd)}
.lkt th:first-child{text-align:left;width:46%;padding-left:12px}
.lkt td{text-align:center;padding:10px 6px;border-top:0.5px solid var(--brd)}
.lkt tbody tr:hover td{background:var(--surf)}
.lkt td:first-child{text-align:left;font-size:13px;padding-left:12px;padding-right:8px;line-height:1.4}
.lkt input[type=radio]{accent-color:var(--p);width:16px;height:16px;cursor:pointer}
input[type=text],input[type=email],textarea{width:100%;padding:10px 12px;border:0.5px solid var(--brd);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.err{font-size:12px;color:#D85A30;margin-top:5px;display:none}
.err.show{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:20px;border-top:0.5px solid var(--brd)}
.btn{padding:10px 22px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid rgba(0,0,0,0.25);background:var(--bg);color:var(--text);font-family:inherit}
.btn:hover{background:var(--surf)}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}
.btn-p:hover{background:var(--pd);border-color:var(--pd)}
.si{font-size:12px;color:var(--hint)}
.suc{text-align:center;padding:36px 16px}
.suc-icon{width:60px;height:60px;background:var(--tl);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.suc-icon svg{width:28px;height:28px;fill:none;stroke:var(--t);stroke-width:2.5}
.suc-title{font-size:20px;font-weight:600;margin-bottom:10px}
.suc-text{font-size:14px;color:var(--mut);line-height:1.75}
@media(max-width:480px){.card{padding:20px 14px}.btn{padding:9px 16px;font-size:13px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div class="uni">Bachelorarbeit &middot; Technische Hochschule Mannheim<br>Black Box vs. Compliance &middot; Bahar Sanl&#305;alp</div>
  </div>
  <div class="pb-bg"><div class="pb-fill" id="pb" style="width:0%"></div></div>
  <div class="pb-meta"><span id="pl">Seite 1 von 6</span><span class="sv" id="sv">&#10003; Gespeichert</span></div>
  <div id="app"></div>
</div>

<script>
function uid(){return'sess_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
const SID=localStorage.getItem('_sid')||(()=>{const i=uid();localStorage.setItem('_sid',i);return i})();
const A=JSON.parse(localStorage.getItem('_ans')||'{}');
let step=parseInt(localStorage.getItem('_step')||'0');

const S=[
  {badge:'Willkommen',title:'Umfrage: EU AI Act in der Praxis',
   intro:'Diese Umfrage untersucht im Rahmen einer Bachelorarbeit an der TH Mannheim, wie IT-Unternehmen mit den Anforderungen des EU AI Acts umgehen &ndash; insbesondere beim Black-Box-Problem bei tiefen neuronalen Netzen. Dauer: ca. 8&ndash;10 Minuten.',
   notice:'Die Umfrage ist anonym. F&uuml;r das Gewinnspiel (1&times;10&thinsp;&euro; Wunschgutschein) k&ouml;nnen Sie optional Ihre E-Mail angeben. Diese wird nicht mit Ihren Antworten verkn&uuml;pft.',
   qs:[{id:'email',t:'email',label:'E-Mail-Adresse (optional, nur f&uuml;r Gewinnspiel)',ph:'ihre@email.de'}]},

  {badge:'Abschnitt 1 &ndash; Unternehmen',title:'Angaben zum Unternehmen',qs:[
    {id:'size',t:'r',req:1,label:'Wie viele Mitarbeitende hat Ihr Unternehmen?',
     opts:['1&ndash;10','11&ndash;50','51&ndash;250','251&ndash;1.000','Mehr als 1.000']},
    {id:'role',t:'r',req:1,label:'Welche Funktion haben Sie in Ihrem Unternehmen?',
     opts:['Softwareentwicklung / Data Science','Technische Leitung / Architektur','Compliance / Recht / Datenschutz','Gesch&auml;ftsf&uuml;hrung / Management','Sonstige']},
    {id:'sector',t:'r',req:1,label:'In welcher Branche ist Ihr Unternehmen t&auml;tig?',
     opts:['Software- / Technologieunternehmen','Finanzdienstleistungen / FinTech','Gesundheitswesen / MedTech','Industrie / Fertigung','Beratung / IT-Dienstleistung','Sonstige']},
    {id:'ai',t:'r',req:1,label:'Setzt Ihr Unternehmen KI-Systeme produktiv ein?',
     opts:['Ja, tiefe neuronale Netze (z.&thinsp;B. CNN, LSTM, Transformer)','Ja, andere KI-Verfahren (z.&thinsp;B. Entscheidungsb&auml;ume, klassisches ML)','Nein, aber geplant','Nein']}
  ]},

  {badge:'Abschnitt 2 &ndash; EU AI Act',title:'Kenntnisstand zum EU AI Act',qs:[
    {id:'know',t:'r',req:1,label:'Wie gut kennen Sie die Anforderungen des EU AI Acts?',
     opts:['Sehr gut &ndash; Gesetzestext gelesen und Details bekannt','Gut &ndash; wesentliche Anforderungen bekannt','Grundlegend &ndash; Begriff bekannt, keine Details','Kaum &ndash; wenig davon geh&ouml;rt','Gar nicht']},
    {id:'riskclass',t:'r',req:1,label:'Wissen Sie, in welche Risikoklasse Ihre KI-Systeme fallen?',
     opts:['Ja, Klassifizierung wurde durchgef&uuml;hrt','Teilweise &ndash; f&uuml;r einige Systeme','Nein, noch nicht analysiert','Nicht relevant f&uuml;r unser Unternehmen']},
    {id:'compliance',t:'r',req:1,label:'Wie sch&auml;tzen Sie Ihren aktuellen Compliance-Stand ein?',
     opts:['Vollst&auml;ndig konform','Weitgehend konform &ndash; kleinere L&uuml;cken','In Arbeit &ndash; aktiv dabei','Noch nicht begonnen','Nicht relevant f&uuml;r unser Unternehmen']}
  ]},

  {badge:'Abschnitt 3 &ndash; Black-Box-Problem',title:'Umgang mit dem Black-Box-Problem',qs:[
    {id:'bbawar',t:'r',req:1,label:'Ist das Black-Box-Problem bei neuronalen Netzen in Ihrem Unternehmen bekannt?',
     opts:['Ja, wird aktiv diskutiert und adressiert','Ja, bekannt, aber nicht systematisch adressiert','Teilweise bekannt','Nein, kaum bekannt']},
    {id:'xai',t:'c',label:'Welche Erkl&auml;rbarkeitsmethoden setzt Ihr Unternehmen ein? (Mehrfachauswahl)',
     opts:['SHAP','LIME','Grad-CAM','Attention-Visualisierung','Saliency Maps','Keine &ndash; nur interpretierbare Modelle','Keine Erkl&auml;rbarkeitsmethoden','Sonstige']},
    {id:'lk1',t:'l',label:'Wie stark stimmen Sie folgenden Aussagen zu?',
     hint:'1 = stimme gar nicht zu &nbsp;&bull;&nbsp; 5 = stimme voll zu',
     scale:['1','2','3','4','5'],
     items:['Die Intransparenz unserer KI-Systeme erschwert die EU AI Act-Erf&uuml;llung erheblich.',
            'Verf&uuml;gbare XAI-Methoden reichen f&uuml;r die Transparenzanforderungen aus.',
            'Das Black-Box-Problem mindert das Kundenvertrauen in unsere KI-Systeme.',
            'Wir sind bereit, Modellleistung zugunsten besserer Interpretierbarkeit zu opfern.']}
  ]},

  {badge:'Abschnitt 4 &ndash; Herausforderungen',title:'Herausforderungen bei der Umsetzung',qs:[
    {id:'lk2',t:'l',label:'Wie gro&szlig; sind folgende Herausforderungen bei der Umsetzung des EU AI Acts?',
     hint:'1 = keine Herausforderung &nbsp;&bull;&nbsp; 5 = sehr gro&szlig;e Herausforderung',
     scale:['1','2','3','4','5'],
     items:['Fehlende technische Standards f&uuml;r Erkl&auml;rbarkeit',
            'Unklare rechtliche Anforderungen / Interpretationsspielraum',
            'Mangelndes internes Fachwissen',
            'Hoher Aufwand f&uuml;r technische Dokumentation',
            'Fehlende Tools zur Konformit&auml;tsbewertung',
            'Wirtschaftliche Kosten der Compliance']},
    {id:'barrier',t:'r',req:1,label:'Was ist die gr&ouml;&szlig;te einzelne H&uuml;rde bei der Compliance?',
     opts:['Technisch: Erkl&auml;rbarkeit nicht realisierbar','Ressourcen: zu wenig Personal / Budget','Wissen: unklare gesetzliche Anforderungen','Prozesse: fehlende interne Governance','Zeitdruck: zu kurze Umsetzungsfristen','Keine wesentliche H&uuml;rde']},
    {id:'support',t:'c',label:'Welche Unterst&uuml;tzung w&uuml;nschen Sie sich? (Mehrfachauswahl)',
     opts:['Klare technische Standards / Normen','Praxisbeispiele / Best Practices','Beh&ouml;rdliche Leitf&auml;den','Externe Beratung','Weiterbildungsangebote','Softwaretools zur Konformit&auml;tsbewertung','Keine Unterst&uuml;tzung notwendig']}
  ]},

  {badge:'Abschnitt 5 &ndash; Ausblick',title:'Pers&ouml;nliche Einsch&auml;tzungen',qs:[
    {id:'feas',t:'r',req:1,label:'Halten Sie es f&uuml;r technisch realisierbar, die Transparenzanforderungen des EU AI Acts f&uuml;r tiefe neuronale Netze vollst&auml;ndig zu erf&uuml;llen?',
     opts:['Ja, vollst&auml;ndig realisierbar','Teilweise &ndash; f&uuml;r einfachere Anwendungsf&auml;lle','Nur mit Kompromissen bei der Modellleistung','Nein, technisch nicht vollst&auml;ndig realisierbar','Wei&szlig; nicht']},
    {id:'opinion',t:'r',req:1,label:'Wie bewerten Sie den EU AI Act insgesamt?',
     opts:['Sehr positiv &ndash; notwendig und sinnvoll','Positiv &ndash; gut gemeint, teils unpraktikabel','Neutral','Negativ &ndash; hemmt Innovation ohne ausreichenden Mehrwert','Sehr negativ']},
    {id:'lk3',t:'l',label:'Wie sch&auml;tzen Sie die zuk&uuml;nftige Entwicklung ein?',
     hint:'1 = stimme gar nicht zu &nbsp;&bull;&nbsp; 5 = stimme voll zu',
     scale:['1','2','3','4','5'],
     items:['Erkl&auml;rbare KI wird in den n&auml;chsten 3 Jahren zum Standard in unserer Branche.',
            'Der EU AI Act wird die Qualit&auml;t von KI-Systemen in der EU verbessern.',
            'Unternehmen ohne EU AI Act-Compliance werden erhebliche Wettbewerbsnachteile haben.']},
    {id:'comment',t:'ta',label:'Weitere Anmerkungen oder Erfahrungen?',ph:'Ihre Anmerkungen (optional)...'}
  ]}
];

function decode(s){return s.replace(/&[a-z#0-9]+;/g,e=>(
  {'&ndash;':'–','&nbsp;':' ','&thinsp;':' ','&times;':'×','&euro;':'€',
   '&uuml;':'ü','&ouml;':'ö','&auml;':'ä','&Uuml;':'Ü','&Ouml;':'Ö','&Auml;':'Ä',
   '&szlig;':'ß','&shy;':'','&bull;':'•','&middot;':'·','&gt;':'>','&lt;':'<'}[e]||e));}

async function sync(done){
  try{
    await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sessionId:SID,step,answers:A,completed:!!done})});
    const el=document.getElementById('sv');
    if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
  }catch(e){}
}

function persist(){
  localStorage.setItem('_ans',JSON.stringify(A));
  localStorage.setItem('_step',step);
  sync(false);
}

function pct(){return Math.round(step/S.length*100);}

function render(){
  const s=S[step];
  if(!s){done();return;}
  document.getElementById('pb').style.width=pct()+'%';
  document.getElementById('pl').textContent='Seite '+(step+1)+' von '+S.length;

  let h='<div class="badge">'+s.badge+'</div><h1>'+s.title+'</h1>';
  if(s.intro) h+='<p class="intro">'+s.intro+'</p>';
  if(s.notice) h+='<div class="notice"><span style="font-size:18px;margin-top:1px;flex-shrink:0">&#8505;</span><span>'+s.notice+'</span></div>';

  s.qs.forEach(q=>{
    h+='<div class="qb" id="qb_'+q.id+'">';
    if(q.t==='r'){
      h+='<div class="ql">'+q.label+(q.req?'<span class="req"> *</span>':'')+'</div><div class="opts">';
      q.opts.forEach(o=>{
        const v=decode(o);
        const sel=A[q.id]===v?' sel':'';
        h+='<label class="opt'+sel+'" onclick="selR(\''+q.id+'\',this,'+JSON.stringify(v)+')"><input type="radio" name="r_'+q.id+'"'+(A[q.id]===v?' checked':'')+'><span class="opt-t">'+o+'</span></label>';
      });
      h+='</div><div class="err" id="err_'+q.id+'">Bitte w&auml;hlen Sie eine Option.</div>';
    } else if(q.t==='c'){
      h+='<div class="ql">'+q.label+'</div><div class="opts">';
      const ch=A[q.id]||[];
      q.opts.forEach(o=>{
        const v=decode(o);
        const sel=ch.includes(v)?' sel':'';
        h+='<label class="opt'+sel+'" onclick="togC(\''+q.id+'\','+JSON.stringify(v)+',this)"><input type="checkbox"'+(ch.includes(v)?' checked':'')+'><span class="opt-t">'+o+'</span></label>';
      });
      h+='</div>';
    } else if(q.t==='l'){
      h+='<div class="ql">'+q.label+'</div>';
      if(q.hint) h+='<div class="qhint">'+q.hint+'</div>';
      h+='<div class="lkwrap"><table class="lkt"><thead><tr><th></th>';
      q.scale.forEach(v=>h+='<th>'+v+'</th>');
      h+='</tr></thead><tbody>';
      const sv=A[q.id]||{};
      q.items.forEach((it,ii)=>{
        const itv=decode(it);
        h+='<tr><td>'+it+'</td>';
        q.scale.forEach(v=>h+='<td><input type="radio" name="lk_'+q.id+'_'+ii+'" value="'+v+'"'+(sv[itv]===v?' checked':'')+' onchange="saveLk(\''+q.id+'\','+JSON.stringify(itv)+',this.value)"></td>');
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    } else if(q.t==='email'||q.t==='text'){
      h+='<div class="ql">'+q.label+'</div><input type="'+q.t+'" placeholder="'+(q.ph||'')+'" value="'+(A[q.id]||'')+'" oninput="A[\''+q.id+'\']=this.value;persist()">';
    } else if(q.t==='ta'){
      h+='<div class="ql">'+q.label+'</div><textarea placeholder="'+(q.ph||'')+'" oninput="A[\''+q.id+'\']=this.value;persist()">'+(A[q.id]||'')+'</textarea>';
    }
    h+='</div>';
  });

  h+='<div class="nav"><span class="si">'+(step+1)+' / '+S.length+'</span><div style="display:flex;gap:10px">';
  if(step>0) h+='<button class="btn" onclick="prev()">&#8592; Zur&uuml;ck</button>';
  if(step<S.length-1) h+='<button class="btn btn-p" onclick="next()">Weiter &#8594;</button>';
  else h+='<button class="btn btn-p" onclick="submit()">Absenden &#10003;</button>';
  h+='</div></div>';

  document.getElementById('app').innerHTML=h;
}

function selR(id,el,val){
  document.querySelectorAll('[name="r_'+id+'"]').forEach(r=>r.closest('.opt').classList.remove('sel'));
  el.classList.add('sel');el.querySelector('input').checked=true;
  A[id]=val;persist();
  const e=document.getElementById('err_'+id);if(e)e.classList.remove('show');
}
function togC(id,val,el){
  if(!A[id])A[id]=[];
  const i=A[id].indexOf(val);
  if(i===-1){A[id].push(val);el.classList.add('sel');el.querySelector('input').checked=true;}
  else{A[id].splice(i,1);el.classList.remove('sel');el.querySelector('input').checked=false;}
  persist();
}
function saveLk(id,item,val){if(!A[id])A[id]={};A[id][item]=val;persist();}

function validate(){
  let ok=true;
  S[step].qs.forEach(q=>{
    if(q.req&&!A[q.id]){
      const e=document.getElementById('err_'+q.id);if(e)e.classList.add('show');
      if(ok)document.getElementById('qb_'+q.id).scrollIntoView({behavior:'smooth',block:'center'});
      ok=false;
    }
  });return ok;
}

function next(){if(!validate())return;step++;persist();render();window.scrollTo(0,0);}
function prev(){step--;persist();render();window.scrollTo(0,0);}
async function submit(){
  if(!validate())return;
  A._ts=new Date().toISOString();
  await sync(true);
  localStorage.removeItem('_ans');
  localStorage.removeItem('_step');
  done();
}

function done(){
  document.getElementById('pb').style.width='100%';
  document.getElementById('pl').textContent='Abgeschlossen';
  document.getElementById('app').innerHTML=`
    <div class="suc">
      <div class="suc-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="suc-title">Vielen Dank f&uuml;r Ihre Teilnahme!</div>
      <p class="suc-text">Ihre Antworten wurden gespeichert und flie&szlig;en in die Bachelorarbeit ein.<br><br>
      <em>Black Box vs. Compliance: Herausforderungen bei der Umsetzung des EU AI Acts<br>in Unternehmen im Bezug auf tiefe neuronale Netze</em><br><br>
      Bahar Sanl&#305;alp &middot; Technische Hochschule Mannheim</p>
    </div>`;
}

render();
</script>
</body>
</html>
