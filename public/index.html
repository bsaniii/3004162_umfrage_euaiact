<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umfrage: EU AI Act in der Praxis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F2D5E;--navy2:#1A3F7A;
  --accent:#2563EB;--accent-light:#EFF6FF;--accent-mid:#BFDBFE;
  --text:#0F172A;--mut:#475569;--hint:#94A3B8;
  --bg:#FFFFFF;--surf:#F8FAFC;--surf2:#F1F5F9;
  --brd:#E2E8F0;--brd2:#CBD5E1;
  --success:#065F46;--success-light:#ECFDF5;
  --danger:#DC2626;--r:6px;--rl:10px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--surf);color:var(--text);min-height:100vh;padding:0}
.header{background:var(--navy);padding:14px 24px;display:flex;align-items:center;gap:12px}
.header-logo{width:34px;height:34px;background:rgba(255,255,255,0.15);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2}
.header-text{color:#fff}
.header-text h1{font-size:14px;font-weight:600;letter-spacing:.01em}
.header-text p{font-size:11px;opacity:.7;margin-top:1px}
.container{max-width:660px;margin:0 auto;padding:28px 16px}
.card{background:var(--bg);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{background:var(--navy);padding:20px 24px}
.card-header .badge{display:inline-block;background:rgba(255,255,255,0.15);color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.card-header h2{font-size:18px;font-weight:600;color:#fff;line-height:1.3}
.prog-wrap{background:rgba(255,255,255,0.1);height:3px;margin-top:16px;border-radius:2px}
.prog-fill{height:3px;background:#60A5FA;border-radius:2px;transition:width .4s ease}
.prog-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:rgba(255,255,255,0.6)}
.sv{display:none;align-items:center;gap:4px;color:#86EFAC}.sv.show{display:flex}
.card-body{padding:24px}
.intro{font-size:14px;color:var(--mut);line-height:1.75;margin-bottom:16px}
.info-box{background:var(--surf2);border-left:3px solid var(--navy);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;margin-bottom:14px}
.info-box h3{font-size:12px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.info-box p{font-size:13px;color:var(--mut);line-height:1.65}
.notice{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:var(--r);padding:12px 14px;font-size:13px;color:#1E40AF;margin-bottom:22px;display:flex;gap:10px;line-height:1.55}
.notice-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.qb{margin-bottom:22px}
.ql{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.5;color:var(--text)}
.req{color:var(--danger)}
.qhint{font-size:12px;color:var(--hint);margin-bottom:8px;font-style:italic}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .15s;user-select:none;background:var(--bg)}
.opt:hover{border-color:var(--accent);background:var(--accent-light)}
.opt.sel{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 1px var(--accent)}
.opt input{margin-top:2px;accent-color:var(--accent);flex-shrink:0;width:15px;height:15px;pointer-events:none}
.opt-t{font-size:14px;line-height:1.45;color:var(--text)}
.other-input{width:100%;margin-top:8px;padding:8px 12px;border:1px solid var(--brd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;display:none}
.other-input.show{display:block}
.other-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.lkwrap{overflow-x:auto;border:1px solid var(--brd);border-radius:var(--r)}
.lkt{width:100%;border-collapse:collapse;min-width:460px}
.lkt th{font-weight:500;color:var(--mut);text-align:center;padding:10px 8px;font-size:12px;background:var(--surf2);border-bottom:1px solid var(--brd)}
.lkt th:first-child{text-align:left;width:46%;padding-left:14px}
.lkt td{text-align:center;padding:10px 8px;border-top:1px solid var(--brd)}
.lkt tbody tr:hover td{background:var(--surf)}
.lkt td:first-child{text-align:left;font-size:13px;padding-left:14px;padding-right:8px;line-height:1.4;color:var(--text)}
.lkt input[type=radio]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
input[type=text],input[type=email],textarea{width:100%;padding:10px 12px;border:1px solid var(--brd);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.err{font-size:12px;color:var(--danger);margin-top:5px;display:none}.err.show{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:var(--surf2);border-top:1px solid var(--brd)}
.btn{padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--brd2);background:var(--bg);color:var(--text);font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surf2);border-color:var(--navy)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--navy);color:#fff;border-color:var(--navy)}.btn-p:hover{background:var(--navy2)}
.si{font-size:12px;color:var(--hint)}
.suc{text-align:center;padding:40px 24px}
.suc-icon{width:64px;height:64px;background:var(--success-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid #A7F3D0}
.suc-icon svg{width:30px;height:30px;fill:none;stroke:var(--success);stroke-width:2.5}
.suc-title{font-size:22px;font-weight:600;margin-bottom:10px}
.suc-text{font-size:14px;color:var(--mut);line-height:1.75}
.suc-text em{color:var(--navy);font-style:normal;font-weight:500}
.divider{height:1px;background:var(--brd);margin:20px 0}
@media(max-width:480px){.container{padding:16px 12px}.card-header{padding:16px}.card-body{padding:16px}.nav{padding:12px 16px}.btn{padding:9px 16px;font-size:13px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
  <div class="header-text">
    <h1>Technische Hochschule Mannheim</h1>
    <p>Bachelorarbeit &middot; Bahar Sanl&#305;alp &middot; Fakult&auml;t Informatik</p>
  </div>
</div>
<div class="container">
<div class="card">
  <div class="card-header">
    <div class="badge" id="badge">Willkommen</div>
    <h2 id="title">Umfrage: EU AI Act in der Praxis</h2>
    <div class="prog-wrap"><div class="prog-fill" id="pb" style="width:0%"></div></div>
    <div class="prog-meta"><span id="plabel">Seite 1 von 6</span><span class="sv" id="sv"><span>&#10003;</span> Gespeichert</span></div>
  </div>
  <div class="card-body" id="app"></div>
  <div class="nav" id="nav-bar">
    <span class="si" id="step-info">1 / 6</span>
    <div style="display:flex;gap:8px" id="nav-btns"></div>
  </div>
</div>
</div>
<script>
var A={};var step=0;
function uid(){return'sess_'+Math.random().toString(36).slice(2)+Date.now().toString(36);}
var SID=localStorage.getItem('_sid');
if(!SID){SID=uid();localStorage.setItem('_sid',SID);}
try{A=JSON.parse(localStorage.getItem('_ans')||'{}');}catch(e){A={};}
step=parseInt(localStorage.getItem('_step')||'0');

var STEPS=[
  {badge:'Willkommen',title:'Umfrage: EU AI Act in der Praxis',
   intro:'Diese Umfrage untersucht im Rahmen einer Bachelorarbeit an der Technischen Hochschule Mannheim, wie IT-Unternehmen mit den Anforderungen des EU AI Acts umgehen - insbesondere in Bezug auf das Black-Box-Problem bei tiefen neuronalen Netzen. Die Teilnahme dauert ca. 8-10 Minuten.',
   boxes:[
     {title:'Was ist der EU AI Act?',text:'Der EU AI Act (Verordnung (EU) 2024/1689) ist das erste rechtsverbindliche KI-Gesetz der Welt. Er trat am 1. August 2024 in Kraft und verpflichtet Unternehmen, KI-Systeme in sogenannten Hochrisikobereichen (z.\u00a0B. Personalentscheidungen, Kreditvergabe, Medizin, Biometrie) transparent, dokumentiert und menschlich kontrollierbar zu gestalten.'},
     {title:'Was ist das Black-Box-Problem?',text:'Tiefe neuronale Netze (z.\u00a0B. CNNs, LSTMs, Transformer) erzielen herausragende Leistungen, treffen ihre Entscheidungen jedoch auf Basis von Millionen von Parametern, die f\u00fcr Menschen nicht direkt nachvollziehbar sind. Dieses Ph\u00e4nomen wird als Black-Box-Problem bezeichnet. Methoden der erkl\u00e4rbaren KI (XAI) wie SHAP, LIME oder Grad-CAM versuchen, diese Entscheidungen im Nachhinein zu erkl\u00e4ren.'}
   ],
   notice:'Die Umfrage ist anonym. Für das Gewinnspiel (1x10 Euro Wunschgutschein) können Sie optional Ihre E-Mail-Adresse angeben. Diese wird nicht mit Ihren Antworten verknüpft.',
   qs:[{id:'email',t:'email',label:'E-Mail-Adresse (optional - nur für die Teilnahme am Gewinnspiel)',ph:'ihre@email.de'}]},
  {badge:'Abschnitt 1 - Unternehmen',title:'Angaben zum Unternehmen',qs:[
    {id:'size',t:'r',req:true,label:'Wie viele Mitarbeitende hat Ihr Unternehmen?',
     opts:['Kleinstunternehmen: unter 10 Mitarbeitende','Kleinunternehmen: 10-49 Mitarbeitende','Mittleres Unternehmen: 50-249 Mitarbeitende','Grossunternehmen: 250-999 Mitarbeitende','Konzern: 1.000-9.999 Mitarbeitende','Grosskonzern: 10.000 oder mehr Mitarbeitende']},
    {id:'role',t:'r',req:true,label:'Welche Funktion haben Sie in Ihrem Unternehmen?',
     opts:['Softwareentwicklung / Data Science / ML Engineering','Technische Leitung / Architektur / CTO','Compliance / Recht / Datenschutz / Risk Management','Geschaftsführung / C-Level Management','Produktmanagement / Projektleitung','Forschung & Entwicklung','Sonstige'],other:'role'},
    {id:'sector',t:'r',req:true,label:'In welcher Branche ist Ihr Unternehmen hauptsächlich tätig?',
     opts:['Software- / Technologieunternehmen (inkl. IT-Beratung)','Finanzdienstleistungen / FinTech / InsurTech','Gesundheitswesen / MedTech / Pharma','Automobilindustrie / Mobilität','Industrie / Fertigung / Maschinenbau','Handel / E-Commerce / Konsumgüter','Öffentlicher Sektor / Behörden','Sonstige'],other:'sector'},
    {id:'ai',t:'r',req:true,label:'Setzt Ihr Unternehmen KI-Systeme produktiv ein?',
     opts:['Ja, tiefe neuronale Netze (CNN, LSTM, Transformer, LLMs etc.)','Ja, andere KI-Verfahren (Entscheidungsbäume, klassisches ML, Regelbasierte Systeme)','Ja, beides - sowohl DNNs als auch klassische Verfahren','Nein, aber konkret geplant (innerhalb der nächsten 12 Monate)','Nein, keine KI-Systeme im Einsatz']}
  ]},
  {badge:'Abschnitt 2 - EU AI Act',title:'Kenntnisstand zum EU AI Act',qs:[
    {id:'know',t:'r',req:true,label:'Wie würden Sie Ihren Kenntnisstand zum EU AI Act einschätzen?',
     opts:['Experte: Gesetzestext gelesen, Details und Umsetzungsanforderungen bekannt','Fortgeschritten: Wesentliche Anforderungen, Risikoklassen und Pflichten bekannt','Grundlegend: Grundsätzliche Ziele bekannt, aber keine Detailkenntnisse','Anfänger: Name bekannt, kaum inhaltliche Kenntnisse','Kein Kenntnisstand: Kenne den EU AI Act nicht']},
    {id:'riskclass',t:'r',req:true,label:'Wissen Sie, in welche Risikoklasse die KI-Systeme Ihres Unternehmens fallen?',
     opts:['Ja, formale Klassifizierung wurde durchgeführt und dokumentiert','Ja, interne Einschätzung liegt vor, aber noch nicht formal dokumentiert','Teilweise - für einige Systeme wurde eine Einstufung vorgenommen','Nein, noch nicht analysiert - ist aber geplant','Nein, noch nicht analysiert und kein Plan vorhanden','Nicht anwendbar - keine relevanten KI-Systeme im Einsatz']},
    {id:'compliance',t:'r',req:true,label:'Wie w&uuml;rden Sie den aktuellen Compliance-Stand Ihres Unternehmens in Bezug auf den EU AI Act einsch&auml;tzen?',
     opts:['Vollst&auml;ndig konform &ndash; alle Anforderungen erf&uuml;llt und dokumentiert','Weitgehend konform &ndash; gro&szlig;er Teil umgesetzt, kleinere L&uuml;cken bekannt','In Arbeit &ndash; Compliance-Prozess l&auml;uft aktiv','Fr&uuml;hphase &ndash; erste Ma&szlig;nahmen eingeleitet, aber noch am Anfang','Noch nicht begonnen &ndash; kein aktiver Compliance-Prozess','Unklar &ndash; wir haben noch nicht gepr&uuml;ft, ob und inwieweit der EU AI Act f&uuml;r uns relevant ist','Nicht relevant &ndash; EU AI Act gilt nicht f&uuml;r unsere Systeme']}
  ]},
  {badge:'Abschnitt 3 - Black-Box-Problem',title:'Umgang mit dem Black-Box-Problem',qs:[
    {id:'bbawar',t:'r',req:true,label:'Inwieweit ist das Black-Box-Problem tiefer neuronaler Netze in Ihrem Unternehmen ein bekanntes Thema?',
     opts:['Zentrales Thema - wird aktiv auf Strategie- und Technikebene adressiert','Bekanntes Thema - wird diskutiert, aber nicht systematisch adressiert','Teilweise bekannt - einzelne Teams sind sensibilisiert, keine einheitliche Position','Kaum bekannt - nur Einzelpersonen haben Kenntnisse darüber','Nicht bekannt - kein Bewusstsein für das Problem im Unternehmen']},
    {id:'xai',t:'c',label:'Welche Methoden der erklarbaren KI (XAI) setzt Ihr Unternehmen ein? (Mehrfachauswahl)',
     opts:['SHAP (SHapley Additive exPlanations)','LIME (Local Interpretable Model-Agnostic Explanations)','Grad-CAM (Gradient-weighted Class Activation Mapping)','Attention-Visualisierung (z.B. bei Transformer-Modellen)','Saliency Maps / Gradient-basierte Methoden','Kontrafaktische Erklärungen (Counterfactual Explanations)','Keine - wir setzen ausschliesslich interpretierbare Modelle ein','Keine XAI-Methoden im Einsatz','Nicht bekannt / Ich bin mir nicht sicher','Sonstige'],other:'xai'},
    {id:'lk1',t:'l',label:'Wie stark stimmen Sie folgenden Aussagen zu?',
     hint:'1 = stimme gar nicht zu     5 = stimme voll zu',scale:['1','2','3','4','5'],
     items:['Die Intransparenz unserer KI-Systeme erschwert die Erfüllung der EU AI Act-Anforderungen erheblich.',
            'Verfügbare XAI-Methoden reichen aus, um die Transparenzanforderungen des EU AI Acts zu erfüllen.',
            'Das Black-Box-Problem beeinträchtigt das Vertrauen unserer Kunden und Stakeholder in unsere KI-Systeme.',
            'Wir priorisieren Modellleistung gegenüber Interpretierbarkeit, wenn beides nicht gleichzeitig erreichbar ist.']}
  ]},
  {badge:'Abschnitt 4 - Herausforderungen',title:'Herausforderungen bei der Umsetzung',qs:[
    {id:'lk2',t:'l',label:'Wie groß sind folgende Herausforderungen bei der Umsetzung des EU AI Acts?',
     hint:'1 = keine Herausforderung     5 = sehr große Herausforderung',scale:['1','2','3','4','5'],
     items:['Fehlende technische Normen fur Erklärbarkeit (z.B. ISO/IEC, CEN)',
            'Unklare oder interpretationsoffene rechtliche Anforderungen im Gesetzestext',
            'Mangelndes internes Fachwissen zu KI-Regulierung und Compliance',
            'Hoher Aufwand für technische Dokumentation und Konformitätsbewertung',
            'Fehlende Software-Tools zur Unterstützung der Compliance',
            'Wirtschaftliche Kosten der Compliance im Verhältnis zum Nutzen',
            'Fehlende Ressourcen (Personal, Budget, Zeit) für die Umsetzung']},
    {id:'barrier',t:'r',req:true,label:'Was ist die größte einzelne Hürde bei der EU AI Act-Compliance?',
     opts:['Technisch: Erklärbarkeit bei komplexen KI-Modellen nicht realisierbar','Ressourcen: Unzureichendes Budget, Personal oder Zeit','Rechtlich: Unklare und interpretationsoffene Anforderungen','Organisatorisch: Fehlende interne Governance-Strukturen','Zeitlich: Zu kurze Umsetzungsfristen bei hohem Aufwand','Wissen: Unzureichendes Fachwissen zu regulatorischen Anforderungen','Keine wesentliche Hürde - Compliance ist gut handhabbar']},
    {id:'support',t:'c',label:'Welche Unterstützung würde Ihrem Unternehmen am meisten helfen? (Mehrfachauswahl)',
     opts:['Klare technische Normen und Standards (z.B. harmonisierte EU-Normen)','Praxisnahe Leitfaden mit konkreten Implementierungsbeispielen','Offizielle Leitlinien der zuständigen Behörden','Externe Fachberatung durch Rechts- und KI-Experten','Weiterbildungsangebote und Schulungen für Mitarbeitende','Spezialisierte Software-Tools zur Konformitätsbewertung','Branchenspezifische Austauschformate (z.B. Arbeitsgruppen)','Keine zusätzliche Unterstützung notwendig']}
  ]},
  {badge:'Abschnitt 5 - Ausblick',title:'Persönliche Einschätzungen',qs:[
    {id:'feas',t:'r',req:true,label:'Halten Sie es für technisch realisierbar, die Transparenzanforderungen des EU AI Acts für tiefe neuronale Netze vollständig zu erfüllen?',
     opts:['Ja, vollständig realisierbar - mit bestehenden XAI-Methoden bereits möglich','Weitgehend realisierbar - fur die meisten Anwendungsfälle umsetzbar','Teilweise realisierbar - nur für einfachere Modelle und Anwendungen','Nur mit Kompromissen - Erklärbarkeit erfordert Einbussen bei der Modellleistung','Nicht vollständig realisierbar - grundlegendes technisches Dilemma bleibt','Weiss ich nicht / keine Einschätzung möglich']},
    {id:'opinion',t:'r',req:true,label:'Wie bewerten Sie den EU AI Act insgesamt?',
     opts:['Sehr positiv - notwendige Regulierung, die Vertrauen und Qualität fordert','Positiv - richtige Richtung, aber teilweise zu komplex und unpraktikabel','Neutral - weder besonders positiv noch negativ','Negativ - hemmt Innovation ohne ausreichenden gesellschaftlichen Mehrwert','Sehr negativ - unverhältsnismäßige Belastung für Unternehmen']},
    {id:'lk3',t:'l',label:'Wie schätzen Sie die zukünftige Entwicklung ein?',
     hint:'1 = stimme gar nicht zu     5 = stimme voll zu',scale:['1','2','3','4','5'],
     items:['Erklärbare KI (XAI) wird in den nächsten 3 Jahren zum Industriestandard in unserer Branche.',
            'Der EU AI Act wird langfristig die Qualität und Sicherheit von KI-Systemen in der EU verbessern.',
            'Unternehmen ohne EU AI Act-Compliance werden erhebliche Wettbewerbsnachteile haben.',
            'Die Anforderungen des EU AI Acts werden in 5 Jahren technisch vollständig erfüllbar sein.']},
    {id:'comment',t:'ta',label:'Haben Sie weitere Anmerkungen oder Einschätzungen?',ph:'Ihre Anmerkungen (optional)...'}
  ]}
];

function decode(s){return s.replace(/&[a-z#0-9]+;/g,function(e){return({'&ndash;':'–','&nbsp;':' ','&thinsp;':' ','&times;':'×','&euro;':'€','&uuml;':'ü','&ouml;':'ö','&auml;':'ä','&Auml;':'Ä','&szlig;':'ß','&shy;':'','&middot;':'·'}[e]||e);});}
function persist(){localStorage.setItem('_ans',JSON.stringify(A));localStorage.setItem('_step',''+step);syncServer(false);}
function showSaved(){var el=document.getElementById('sv');if(el){el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2000);}}
function syncServer(done){fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:SID,step:step,answers:A,completed:done})}).then(function(){showSaved();}).catch(function(){});}
function pct(){return Math.round(step/STEPS.length*100);}
function escAttr(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function render(){
  var s=STEPS[step];if(!s){renderDone();return;}
  document.getElementById('pb').style.width=pct()+'%';
  document.getElementById('plabel').textContent='Seite '+(step+1)+' von '+STEPS.length;
  document.getElementById('step-info').textContent=(step+1)+' / '+STEPS.length;
  document.getElementById('badge').innerHTML=s.badge;
  document.getElementById('title').innerHTML=s.title;
  var h='';
  if(s.intro)h+='<p class="intro">'+s.intro+'</p>';
  if(s.boxes){s.boxes.forEach(function(b){h+='<div class="info-box"><h3>'+b.title+'</h3><p>'+b.text+'</p></div>';});}
  if(s.notice)h+='<div class="notice"><span class="notice-icon">&#8505;</span><span>'+s.notice+'</span></div>';
  for(var qi=0;qi<s.qs.length;qi++){
    var q=s.qs[qi];h+='<div class="qb" id="qb_'+q.id+'">';
    if(q.t==='r'){
      h+='<div class="ql">'+q.label+(q.req?'<span class="req"> *</span>':'')+'</div><div class="opts">';
      for(var oi=0;oi<q.opts.length;oi++){var o=q.opts[oi];var dv=decode(o);var sel=(A[q.id]===dv)?'sel':'';var isOther=(o.indexOf('Sonstige')!==-1);h+='<div class="opt '+sel+'" data-qid="'+q.id+'" data-val="'+escAttr(dv)+'" data-other="'+(isOther?'1':'0')+'" onclick="handleRadio(this)"><input type="radio"'+(A[q.id]===dv?' checked':'')+' style="pointer-events:none"><span class="opt-t">'+o+'</span></div>';}
      h+='</div>';
      if(q.other){h+='<input class="other-input'+(A[q.id+'_other']?' show':'')+'" id="other_'+q.id+'" placeholder="Bitte beschreiben..." value="'+(A[q.id+'_other']||'')+'" oninput="A[\''+q.id+'_other\']=this.value;persist()">';}
      h+='<div class="err" id="err_'+q.id+'">Bitte wahlen Sie eine Option aus.</div>';
    }else if(q.t==='c'){
      h+='<div class="ql">'+q.label+'</div><div class="opts">';
      var ch=A[q.id]||[];for(var ci=0;ci<q.opts.length;ci++){var co=q.opts[ci];var cdv=decode(co);var csel=(ch.indexOf(cdv)!==-1)?'sel':'';var cisOther=(co.indexOf('Sonstige')!==-1);h+='<div class="opt '+csel+'" data-qid="'+q.id+'" data-val="'+escAttr(cdv)+'" data-other="'+(cisOther?'1':'0')+'" onclick="handleCheck(this)"><input type="checkbox"'+(ch.indexOf(cdv)!==-1?' checked':'')+' style="pointer-events:none"><span class="opt-t">'+co+'</span></div>';}
      h+='</div>';
      if(q.other){h+='<input class="other-input'+(A[q.id+'_other']?' show':'')+'" id="other_'+q.id+'" placeholder="Bitte angeben..." value="'+(A[q.id+'_other']||'')+'" oninput="A[\''+q.id+'_other\']=this.value;persist()">';}
    }else if(q.t==='l'){
      h+='<div class="ql">'+q.label+'</div>';if(q.hint)h+='<div class="qhint">'+q.hint+'</div>';
      h+='<div class="lkwrap"><table class="lkt"><thead><tr><th>Aussage</th>';
      for(var si=0;si<q.scale.length;si++)h+='<th>'+q.scale[si]+'</th>';
      h+='</tr></thead><tbody>';
      var lkv=A[q.id]||{};
      for(var ii=0;ii<q.items.length;ii++){var item=q.items[ii];var idv=decode(item);h+='<tr><td>'+item+'</td>';for(var sv=0;sv<q.scale.length;sv++){var sv_val=q.scale[sv];h+='<td><input type="radio" name="lk_'+q.id+'_'+ii+'" value="'+sv_val+'"'+(lkv[idv]===sv_val?' checked':'')+' data-qid="'+q.id+'" data-item="'+escAttr(idv)+'" onchange="handleLikert(this)"></td>';}h+='</tr>';}
      h+='</tbody></table></div>';
    }else if(q.t==='email'||q.t==='text'){
      h+='<div class="ql">'+q.label+'</div><input type="'+q.t+'" placeholder="'+(q.ph||'')+'" value="'+(A[q.id]||'')+'" oninput="A[\''+q.id+'\']=this.value;persist()">';
    }else if(q.t==='ta'){
      h+='<div class="ql">'+q.label+'</div><textarea placeholder="'+(q.ph||'')+'" oninput="A[\''+q.id+'\']=this.value;persist()">'+(A[q.id]||'')+'</textarea>';
    }
    h+='</div>';
  }
  document.getElementById('app').innerHTML=h;
  var nb='';
  if(step>0)nb+='<button class="btn" onclick="prevStep()">&#8592; Zuruck</button>';
  if(step<STEPS.length-1)nb+='<button class="btn btn-p" onclick="nextStep()">Weiter &#8594;</button>';
  else nb+='<button class="btn btn-p" onclick="submitForm()">&#10003; Absenden</button>';
  document.getElementById('nav-btns').innerHTML=nb;
}
function handleRadio(el){var qid=el.getAttribute('data-qid');var val=el.getAttribute('data-val');var isOther=el.getAttribute('data-other')==='1';var all=document.querySelectorAll('[data-qid="'+qid+'"]');for(var i=0;i<all.length;i++){all[i].classList.remove('sel');var inp=all[i].querySelector('input');if(inp)inp.checked=false;}el.classList.add('sel');var inp=el.querySelector('input');if(inp)inp.checked=true;A[qid]=val;persist();var oi=document.getElementById('other_'+qid);if(oi){if(isOther)oi.classList.add('show');else{oi.classList.remove('show');delete A[qid+'_other'];}}var err=document.getElementById('err_'+qid);if(err)err.classList.remove('show');}
function handleCheck(el){var qid=el.getAttribute('data-qid');var val=el.getAttribute('data-val');if(!A[qid])A[qid]=[];var idx=A[qid].indexOf(val);if(idx===-1){A[qid].push(val);el.classList.add('sel');var inp=el.querySelector('input');if(inp)inp.checked=true;}else{A[qid].splice(idx,1);el.classList.remove('sel');var inp=el.querySelector('input');if(inp)inp.checked=false;}persist();var oi=document.getElementById('other_'+qid);if(oi){var hasOther=A[qid]&&A[qid].some(function(v){return v.indexOf('Sonstige')!==-1;});if(hasOther)oi.classList.add('show');else{oi.classList.remove('show');delete A[qid+'_other'];}}}
function handleLikert(input){var qid=input.getAttribute('data-qid');var item=input.getAttribute('data-item');if(!A[qid])A[qid]={};A[qid][item]=input.value;persist();}
function validate(){var ok=true;var s=STEPS[step];for(var i=0;i<s.qs.length;i++){var q=s.qs[i];if(q.req&&!A[q.id]){var err=document.getElementById('err_'+q.id);if(err)err.classList.add('show');if(ok){var qb=document.getElementById('qb_'+q.id);if(qb)qb.scrollIntoView({behavior:'smooth',block:'center'});}ok=false;}}return ok;}
function nextStep(){if(!validate())return;step++;persist();render();window.scrollTo(0,0);}
function prevStep(){step--;persist();render();window.scrollTo(0,0);}
function submitForm(){if(!validate())return;A._ts=new Date().toISOString();syncServer(true);localStorage.removeItem('_ans');localStorage.removeItem('_step');renderDone();}
function renderDone(){
  document.getElementById('pb').style.width='100%';
  document.getElementById('plabel').textContent='Abgeschlossen';
  document.getElementById('badge').textContent='Fertig';
  document.getElementById('title').textContent='Vielen Dank!';
  document.getElementById('nav-bar').style.display='none';
  document.getElementById('app').innerHTML='<div class="suc"><div class="suc-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="suc-title">Vielen Dank fur Ihre Teilnahme!</div><div class="divider"></div><p class="suc-text">Ihre Antworten wurden erfolgreich gespeichert und fliessen in die folgende Bachelorarbeit ein:<br><br><em>Black Box vs. Compliance: Herausforderungen bei der Umsetzung des EU AI Acts in Unternehmen im Bezug auf tiefe neuronale Netze</em><br><br>Bahar Sanl&#305;alp &middot; Technische Hochschule Mannheim &middot; 2026</p></div>';
}
render();
</script>
